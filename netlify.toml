[build]
  command = "npm --prefix FairShare/fairshare-frontend run build"
  publish = "FairShare/fairshare-frontend/dist"

[functions]
  directory = "FairShare/fairshare-frontend/netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
